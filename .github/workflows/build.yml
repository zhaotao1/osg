name: build-and-package

# 推送 tag (v*) 或手动触发时, 在 Windows 上构建并产出安装包。
# 依赖(osgEarth/OSG/GDAL/PROJ) 用 vcpkg 构建, 并把编译产物缓存到 GitHub Actions
# 二进制缓存(x-gha): 首次编译较慢, 之后直接复用预编译二进制, 大幅提速。
# 注意: macOS 包在本机打 (bash scripts/pack_mac.sh), CI 不再构建 mac。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  # ================= Windows x64: 产出 .exe / .zip =================
  windows:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v4

      - name: 导出 GHA 缓存令牌 (供 vcpkg x-gha 使用)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: 准备 vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          }

      - name: 安装 NSIS (出 .exe 安装包)
        shell: pwsh
        run: choco install nsis -y

      - name: 配置 (x64 Release, vcpkg 装 osgEarth)
        shell: pwsh
        run: |
          cmake -B build -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_MANIFEST_MODE=ON

      - name: 编译
        run: cmake --build build --config Release -j3

      - name: 打包 (CPack ZIP + NSIS)
        working-directory: build
        run: cpack -G "ZIP;NSIS" -C Release

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            build/*.zip
            build/*.exe
          if-no-files-found: warn

  # ============ 打 tag 时把 Windows 产物发布到 Release ============
  # (macOS 包在本机打, 需要时手动上传到同一个 Release)
  release:
    needs: [ windows ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
