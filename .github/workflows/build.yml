name: build-and-package

# 推送 tag (v*) 或手动触发时, 在 macOS + Windows 上分别构建并产出安装包。
# 依赖(osgEarth/OSG/GDAL/PROJ) 使用 conda-forge 预编译二进制, 无需源码编译, 速度快。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

jobs:
  # ================= macOS: 产出 .dmg / .tar.gz =================
  macos:
    runs-on: macos-14
    defaults:
      run:
        shell: bash -el {0}      # 载入 conda 环境
    steps:
      - uses: actions/checkout@v4

      - name: 安装 osgEarth (conda-forge 预编译)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          create-args: >-
            osgearth
            gdal
            cmake
            ninja
          cache-environment: true

      - name: 配置 (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CONDA_PREFIX"

      - name: 编译
        run: cmake --build build -j3

      - name: 打包 (CPack DragNDrop + TGZ)
        working-directory: build
        run: cpack -G "DragNDrop;TGZ"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: mac-package
          path: |
            build/*.dmg
            build/*.tar.gz
          if-no-files-found: warn

  # ================= Windows x64: 产出 .exe / .zip =================
  windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd /C call {0}   # 激活 conda 环境后执行
    steps:
      - uses: actions/checkout@v4

      - name: 安装 osgEarth (conda-forge 预编译)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: build
          create-args: >-
            osgearth
            gdal
            cmake
            ninja
          init-shell: cmd.exe
          cache-environment: true

      - name: 安装 NSIS (出 .exe 安装包)
        shell: pwsh
        run: choco install nsis -y

      - name: 配置 (x64 Release)
        # conda-forge 在 Windows 的库前缀是 %CONDA_PREFIX%\Library
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%CONDA_PREFIX%\Library"

      - name: 编译
        run: cmake --build build -j3

      - name: 打包 (CPack ZIP + NSIS)
        working-directory: build
        run: cpack -G "ZIP;NSIS"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            build/*.zip
            build/*.exe
          if-no-files-found: warn

  # ============ 打 tag 时把两平台产物汇总发布到 Release ============
  release:
    needs: [ macos, windows ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.dmg
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
